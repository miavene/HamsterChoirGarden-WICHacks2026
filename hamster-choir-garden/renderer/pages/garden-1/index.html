<!DOCTYPE html>
<html lang = en>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src https://fonts.gstatic.com;
         script-src 'self';" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden 1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=DynaPuff:wght@400..700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="../../styles/garden-1.css">
  </head>
  <body>

  <div id="app">

    <!-- main Garden Area -->
    <section id="garden">
      <div id="hamster-container"></div>
      <div id="effects-layer"></div>
    </section>

    <!-- sidebar Area -->
    <aside id="sidebar">

      <!-- Small Top Buttons -->
      <div id="sidebar-nav">
        <button id="add-btn" class="button-background">PLANT: 50 🪙</button>
<!--        <button id="gardens-btn" class="button-background">GARDENS</button>-->
<!--        <button id="goals-btn" class="button-background">GOALS</button>-->
      </div>

      <!-- Activity Feed -->
      <div id="activity-feed">
        <h3>Activity</h3>
        <div id="activity-log"></div>
      </div>

      <!-- Currency -->
      <div id="currency-bar">
        <span>Coins: </span>
        <span id="coin-count">0</span>
      </div>
      <!-- Home button/for test -->
      <button id="home-btn" class="button-background">HOME</button>

    </aside>

  </div>
  <div id="hamster1" class="hamster"><audio id="hamster1Audio" src="../../data/songs/garden1/A.mp3" loop muted></audio></div>
  <div id="hamster2" class="hamster"><audio id="hamster2Audio" src="../../data/songs/garden1/B.mp3" loop muted></audio></div>
  <div id="hamster3" class="hamster"><audio id="hamster3Audio" src="../../data/songs/garden1/C.mp3" loop muted></audio></div>
  <div id="hamster4" class="hamster"><audio id="hamster4Audio" src="../../data/songs/garden1/D.mp3" loop muted></audio></div>
  <div id="hamster5" class="hamster"><audio id="hamster5Audio" src="../../data/songs/garden1/E.mp3" loop muted></audio></div>
  <div id="hamster6" class="hamster"><audio id="hamster6Audio" src="../../data/songs/garden1/F.mp3" loop muted></audio></div>

  <!-- Hamster popup  -->
  <div id="hamster-popup" class="hidden">
    <h3 id="popup-hamster-name">Hamster Name</h3>
    <div id="hamster-stats">
      <p>Level: <span id="level">0</span></p>
      <p>Revenue: <span id="revenue">0 🪙"</span></p>
      <p>State: <span id="state">Normal</span></p>
<!--      <p>Exp Until Next Level: <span id="state">0</span></p>-->

    </div>
    <div id="hamster-actions">
      <button id="sleep-btn" class = "action-button-background">Sleep</button>
      <button id="feed-btn" class="action-button-background">Feed</button>
      <button id="drink-btn" class="action-button-background">Water</button>
      <button id="pet-btn" class="action-button-background">Pet</button>
    </div>
    <button id="close-popup" class="action-button-background">Close</button>
  </div>
  <script type="module" src="../../app.js"></script>
  </body>
</html>
